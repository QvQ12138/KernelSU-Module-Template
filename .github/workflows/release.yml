name: CI Build

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 修复 Node 20 警告，强制用 Node 24
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download and prepare ddns-go binary
        run: |
          echo "Downloading ddns-go v6.16.2 arm64..."
          curl -L -o ddns.tar.gz https://github.com/jeessy2/ddns-go/releases/download/v6.16.2/ddns-go_6.16.2_android_arm64.tar.gz
          tar -xzf ddns.tar.gz
          mkdir -p system/bin
          mv ddns-go system/bin/ddns-go 2>/dev/null || mv */ddns-go system/bin/ddns-go 2>/dev/null
          chmod 755 system/bin/ddns-go
          ls -l system/bin/
          du -sh system/bin/ddns-go || echo "Binary size check failed"
          rm -f ddns.tar.gz *.tar.gz

      - name: Archive
        run: |
          zip -r ddns-go-6.16.2-ksu.zip * \
            -x "*.git*" ".github/*" "README.md" "CHANGELOG.md" "LICENSE" "*.yml" \
            || echo "Zip command failed"
          ls -l ddns-go-6.16.2-ksu.zip

      - name: Release
        uses: meeDamian/github-release@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: 6.16.2
          name: 6.16.2
          body: DDNS-Go v6.16.2 arm64 for KernelSU. Flash via KSU Manager. Web UI: http://127.0.0.1:9876 (if -noweb removed in service.sh).
          files: ddns-go-6.16.2-ksu.zip
          gzip: false
          draft: false
          prerelease: false
          allow_override: true

      - name: Cleanup
        run: rm -f ddns-go-6.16.2-ksu.zip ddns.tar.gz *.tar.gz
